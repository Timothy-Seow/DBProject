{% extends "base.html" %}
{% block title %}Browse Restaurants{% endblock %}

{% block content %}
<div class="container" style="padding-top:36px;padding-bottom:56px">
    <div>
        {% if restaurants %}
            <h2>Restaurants</h2>
            <ul>
                {% for r in restaurants %}
                    <a href="{{ url_for('restaurant', rid=r.restaurant_id) }}">
                        <li>{{ r.name }}</li>
                    </a>
                {% endfor %}
            </ul>
        {% else %}
            <p>No restaurants found.</p>
        {% endif %}
    </div>
</div>
{% endblock %}
