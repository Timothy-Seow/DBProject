{% extends "base.html" %}
{% block title %}Sign In{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth">
    <div class="auth-tabs">
      <button class="auth-tab {% if tab=='login' %}active{% endif %}"
              onclick="switchTab('login', event)">Sign In</button>
      <button class="auth-tab {% if tab=='register' %}active{% endif %}"
              onclick="switchTab('register', event)">Create Account</button>
    </div>

    <!-- Login form -->
    <div id="form-login" class="auth-form {% if tab=='login' %}active{% endif %}">
      <form method="POST" action="{{ url_for('auth') }}">
        <input type="hidden" name="action" value="login">

        <div class="form-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" name="username"
                 class="form-control" placeholder="your username" required>
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password"
                 class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn--primary btn--full mt-16">Sign In</button>
      </form>
    </div>

    <!-- Register form -->
    <div id="form-register" class="auth-form {% if tab=='register' %}active{% endif %}">
      <form method="POST" action="{{ url_for('auth', tab='register') }}">
        <input type="hidden" name="action" value="register">

        <div class="form-group">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" name="username"
                 class="form-control" placeholder="choose a username" required maxlength="50">
        </div>

        <div class="form-group">
          <label for="reg-email">Email address</label>
          <input type="email" id="reg-email" name="email"
                 class="form-control" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" name="password"
                 class="form-control" placeholder="At least 8 characters" required minlength="6">
        </div>

        <button type="submit" class="btn btn--primary btn--full mt-8">Create Account</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function switchTab(tab, event) {
  document.querySelectorAll('.auth-tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(el => el.classList.remove('active'));
  document.querySelector('#form-' + tab).classList.add('active');
  event.target.classList.add('active');
}
</script>
{% endblock %}
