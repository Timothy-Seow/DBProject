{% extends "base.html" %}
{% block title %}Sign In{% endblock %}

{% block content %}
<div class="auth">
    <div class="auth-tabs">
        <button class="auth-tab {% if tab=='login' %}active{% endif %}"
                onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab {% if tab=='register' %}active{% endif %}"
                onclick="switchTab('register')">Create Account</button>
    </div>

    <div id="form-login" class="auth-form {% if tab=='login' %}active{% endif %}">
        <form method="POST" action="{{ url_for('auth') }}">
            <input type="hidden" name="action" value="login">

            <div>
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="username" required>
            </div>

            <div>
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn--primary btn--full mt-16">Sign In</button>
        </form>
    </div>

    <div id="form-register" class="auth-form {% if tab=='register' %}active{% endif %}">
        <form method="POST" action="{{ url_for('auth', tab='register') }}">
          <input type="hidden" name="action" value="register">

            <div>
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="username" required maxlength="50">
            </div>

            <div>
                <label>Email address</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>

            <div>
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="At least 8 characters" required minlength="6">
            </div>

            <button type="submit" class="btn btn--primary btn--full mt-8">Create Account</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(el => el.classList.remove('active'));
  document.querySelector(`#form-${tab}`).classList.add('active');
  event.target.classList.add('active');
}
</script>
{% endblock %}
